services:
  - type: web
    name: aegis-vision-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: cloud
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /api/health
